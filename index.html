<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Base 🏡</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f2f2f7;
      --card:       #ffffff;
      --text:       #1c1c1e;
      --sub:        #6c6c70;
      --ter:        #aeaeb2;
      --border:     rgba(60,60,67,0.12);
      --shadow:     0 2px 20px rgba(0,0,0,0.07);
      --shadow-sm:  0 1px 6px rgba(0,0,0,0.06);
      --becca:      #ff2d55;
      --becca-bg:   rgba(255,45,85,0.08);
      --geoff:      #0071e3;
      --geoff-bg:   rgba(0,113,227,0.08);
      --shared:     #30b050;
      --shared-bg:  rgba(48,176,80,0.08);
      --urgent:     #ff3b30;
      --medium:     #ff9500;
      --low:        #34c759;
      --r:          16px;
      --rs:         10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOADING ─────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0; background: var(--bg); z-index: 500;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px;
    }
    #loading.gone { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--geoff);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-txt { font-size: 15px; color: var(--sub); font-weight: 500; }

    /* ── MODAL ────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
    }
    .overlay.gone { display: none; }
    .modal {
      background: white; border-radius: 20px; padding: 28px;
      max-width: 400px; width: calc(100% - 48px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 8px; }
    .modal p  { font-size: 14px; color: var(--sub); line-height: 1.5; margin-bottom: 20px; }
    .modal-row { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

    /* ── HEADER ───────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 58px;
      display: flex; align-items: center; gap: 20px;
    }
    .logo { font-size: 17px; font-weight: 700; letter-spacing: -0.4px; white-space: nowrap; }
    .tabs { display: flex; gap: 3px; background: var(--bg); padding: 3px; border-radius: 11px; }
    .tab-btn {
      border: none; background: transparent;
      padding: 6px 18px; border-radius: 8px;
      font-size: 14px; font-weight: 500; color: var(--sub);
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.6); }
    .tab-btn.on { background: white; color: var(--text); font-weight: 600; box-shadow: var(--shadow-sm); }
    .tab-btn[data-t="becca"].on  { color: var(--becca); }
    .tab-btn[data-t="geoff"].on  { color: var(--geoff); }
    .tab-btn[data-t="shared"].on { color: var(--shared); }
    #clock {
      margin-left: auto; font-size: 14px; font-weight: 500;
      color: var(--sub); font-variant-numeric: tabular-nums; white-space: nowrap;
    }

    /* ── MAIN ─────────────────────────────────────────────── */
    main { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .pane { display: none; }
    .pane.on { display: block; }

    /* ── PERSONAL HEADER ──────────────────────────────────── */
    .p-head { margin-bottom: 24px; }
    .greeting { font-size: 30px; font-weight: 700; letter-spacing: -0.7px; margin-bottom: 4px; }
    .greeting b { font-weight: 700; }
    .dateline { font-size: 15px; color: var(--sub); }

    /* ── GRID ─────────────────────────────────────────────── */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media (max-width: 760px) { .g2, .g3 { grid-template-columns: 1fr; } }

    /* ── CARD ─────────────────────────────────────────────── */
    .card { background: var(--card); border-radius: var(--r); padding: 20px; box-shadow: var(--shadow); }
    .card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .card-ttl { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    .badge {
      font-size: 12px; font-weight: 500; color: var(--sub);
      background: var(--bg); padding: 2px 9px; border-radius: 20px;
    }

    /* ── INPUTS ───────────────────────────────────────────── */
    .irow { display: flex; gap: 7px; margin-bottom: 12px; }
    .ifield {
      flex: 1; border: 1.5px solid var(--border); border-radius: var(--rs);
      padding: 8px 11px; font-size: 14px; font-family: inherit;
      background: var(--bg); color: var(--text); outline: none;
      transition: border-color 0.15s;
    }
    .ifield:focus { border-color: var(--geoff); background: white; }
    .isel {
      border: 1.5px solid var(--border); border-radius: var(--rs);
      padding: 8px 10px; font-size: 13px; font-family: inherit;
      background: var(--bg); color: var(--text); outline: none; cursor: pointer;
    }
    .btn {
      border: none; border-radius: var(--rs); padding: 8px 14px;
      font-size: 14px; font-weight: 500; font-family: inherit;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-blue  { background: var(--geoff);  color: white; }
    .btn-green { background: var(--shared); color: white; }
    .btn-pink  { background: var(--becca);  color: white; }
    .btn-sm    { padding: 5px 10px; font-size: 12px; }
    .btn-ghost {
      background: transparent; color: var(--sub);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); }
    .btn:hover { opacity: 0.85; }

    /* ── SCHEDULE ─────────────────────────────────────────── */
    .ev-item { display: flex; gap: 10px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .ev-item:last-child { border-bottom: none; }
    .ev-time { font-size: 12px; font-weight: 500; color: var(--sub); white-space: nowrap; min-width: 68px; padding-top: 2px; }
    .ev-dot  { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .ev-ttl  { font-size: 14px; font-weight: 500; }
    .ev-loc  { font-size: 12px; color: var(--sub); margin-top: 2px; }

    /* ── GOALS ────────────────────────────────────────────── */
    .goal-row { display: flex; align-items: center; gap: 9px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .goal-row:last-child { border-bottom: none; }
    .circle {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid var(--border); background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: white; transition: all 0.15s;
    }
    .circle.on { }
    .circle.on::after { content: '✓'; }
    .goal-txt { flex: 1; font-size: 14px; transition: all 0.15s; }
    .goal-txt.done { text-decoration: line-through; color: var(--ter); }
    .x-btn {
      opacity: 0; background: none; border: none; cursor: pointer;
      color: var(--ter); font-size: 14px; padding: 2px 4px;
      transition: opacity 0.15s; line-height: 1;
    }
    .goal-row:hover .x-btn,
    .task-row:hover .x-btn,
    .grocery-row:hover .x-btn,
    .chore-row:hover .x-btn,
    .todo-row:hover .x-btn { opacity: 1; }
    .prog-wrap { margin-top: 12px; }
    .prog-bar  { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .prog-lbl  { font-size: 12px; color: var(--sub); margin-top: 5px; display: flex; justify-content: space-between; }

    /* ── TASK BOARD ───────────────────────────────────────── */
    .task-row { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 8px; transition: background 0.1s; }
    .task-row:hover { background: var(--bg); }
    .t-check {
      width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0;
      border: 1.5px solid var(--border); background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: white; transition: all 0.15s;
    }
    .t-check.on::after { content: '✓'; }
    .t-txt { flex: 1; font-size: 14px; line-height: 1.3; }
    .t-txt.done { text-decoration: line-through; color: var(--ter); }
    .col-lbl {
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .dot8 { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cnt { margin-left: auto; font-size: 11px; color: var(--sub); background: var(--bg); padding: 1px 7px; border-radius: 10px; font-weight: 500; }
    .urgent-lbl { color: var(--urgent); }
    .medium-lbl { color: var(--medium); }
    .low-lbl    { color: var(--low);    }
    .urgent-dot { background: var(--urgent); }
    .medium-dot { background: var(--medium); }
    .low-dot    { background: var(--low);    }
    .urgent-check.on { background: var(--urgent); border-color: var(--urgent); }
    .medium-check.on { background: var(--medium); border-color: var(--medium); }
    .low-check.on    { background: var(--low);    border-color: var(--low);    }

    /* ── GROCERY ──────────────────────────────────────────── */
    .grocery-row { display: flex; align-items: center; gap: 9px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .grocery-row:last-child { border-bottom: none; }
    .g-check {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid var(--border); background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: white; transition: all 0.15s;
    }
    .g-check.on { background: var(--shared); border-color: var(--shared); }
    .g-check.on::after { content: '✓'; }
    .g-txt { flex: 1; font-size: 14px; }
    .g-txt.done { text-decoration: line-through; color: var(--ter); }
    .g-cat { font-size: 11px; padding: 2px 7px; border-radius: 10px; background: var(--bg); color: var(--sub); }

    /* ── CHORES ───────────────────────────────────────────── */
    .chore-row { display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 9px; background: var(--bg); margin-bottom: 5px; transition: background 0.1s; }
    .chore-row:hover { background: #e8e8ed; }
    .c-check {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid var(--border); background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: white; transition: all 0.15s;
    }
    .c-check.on { background: var(--shared); border-color: var(--shared); }
    .c-check.on::after { content: '✓'; }
    .c-txt { flex: 1; font-size: 14px; }
    .c-txt.done { text-decoration: line-through; color: var(--ter); }
    .assignee-pill {
      font-size: 11px; font-weight: 600; padding: 2px 8px;
      border-radius: 10px; white-space: nowrap;
    }
    .pill-becca  { background: var(--becca-bg);  color: var(--becca);  }
    .pill-geoff  { background: var(--geoff-bg);  color: var(--geoff);  }
    .pill-both   { background: var(--shared-bg); color: var(--shared); }

    /* ── TODOS ────────────────────────────────────────────── */
    .todo-row { display: flex; align-items: center; gap: 9px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .todo-row:last-child { border-bottom: none; }
    .td-check {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      border: 2px solid var(--border); background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: white; transition: all 0.15s;
    }
    .td-check.on { background: var(--shared); border-color: var(--shared); }
    .td-check.on::after { content: '✓'; }
    .td-txt { flex: 1; font-size: 14px; }
    .td-txt.done { text-decoration: line-through; color: var(--ter); }
    .td-who { font-size: 11px; color: var(--sub); }

    /* ── MEAL PLAN ────────────────────────────────────────── */
    .meal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; overflow-x: auto; }
    .meal-day  { min-width: 96px; }
    .meal-dh {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.4px; color: var(--sub); text-align: center;
      margin-bottom: 5px;
    }
    .meal-dh.today { color: var(--shared); }
    .meal-dh small { display: block; font-size: 10px; font-weight: 400; letter-spacing: 0; margin-top: 1px; }
    .meal-slot {
      background: var(--bg); border-radius: 8px; padding: 7px 8px;
      margin-bottom: 4px; min-height: 52px; cursor: pointer;
      transition: background 0.1s;
    }
    .meal-slot:hover { background: #e4e4ea; }
    .meal-label { font-size: 9px; font-weight: 600; color: var(--ter); text-transform: uppercase; margin-bottom: 3px; }
    .meal-txt   { font-size: 12px; color: var(--text); line-height: 1.3; }
    .meal-slot.empty .meal-txt { color: var(--ter); font-style: italic; }

    /* ── CALENDAR ──────────────────────────────────────────── */
    .cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .cal-month-lbl { font-size:15px; font-weight:600; letter-spacing:-0.2px; }
    .cal-grid {
      display:grid; grid-template-columns:repeat(7,1fr);
      gap:2px; margin-bottom:12px;
    }
    .cal-dow {
      font-size:11px; font-weight:600; text-align:center; color:var(--sub);
      padding:4px 0; text-transform:uppercase; letter-spacing:0.3px;
    }
    .cal-cell {
      min-height:68px; padding:5px 4px; border-radius:8px;
      cursor:pointer; transition:background 0.1s; position:relative;
    }
    .cal-cell:hover { background:var(--bg); }
    .cal-cell.other-month { opacity:0.3; pointer-events:none; }
    .cal-cell.is-today { background:rgba(0,113,227,0.07); }
    .cal-cell.is-sel   { background:rgba(48,176,80,0.1); outline:2px solid var(--shared); outline-offset:-2px; }
    .cal-day-num { font-size:13px; font-weight:500; margin-bottom:3px; text-align:right; color:var(--sub); }
    .cal-cell.is-today .cal-day-num { color:var(--geoff); font-weight:700; }
    .cal-dots { display:flex; flex-wrap:wrap; gap:2px; }
    .cal-dot  { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .cal-chip {
      font-size:10px; font-weight:500; padding:1px 5px; border-radius:4px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      margin-bottom:2px; display:block; max-width:100%;
    }
    .cal-sel-panel {
      border-top:1px solid var(--border); padding-top:14px; margin-top:4px;
    }
    .cal-sel-date {
      font-size:14px; font-weight:600; margin-bottom:10px; color:var(--text);
    }
    .cal-ev-row {
      display:flex; align-items:center; gap:9px;
      padding:9px 10px; background:var(--bg); border-radius:9px; margin-bottom:5px;
    }
    .cal-ev-time { font-size:12px; color:var(--sub); min-width:60px; flex-shrink:0; font-weight:500; }
    .cal-ev-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .cal-ev-ttl  { font-size:14px; font-weight:500; }
    .cal-ev-loc  { font-size:12px; color:var(--sub); margin-top:1px; }
    .cal-ev-info { flex:1; min-width:0; }
    .link-btn {
      background:none; border:none; color:var(--shared); font-size:inherit;
      cursor:pointer; font-family:inherit; text-decoration:underline; padding:0;
    }

    /* ── SHARED HEADER ────────────────────────────────────── */
    .shared-hdr { margin-bottom: 24px; }
    .shared-ttl { font-size: 30px; font-weight: 700; letter-spacing: -0.7px; margin-bottom: 4px; }
    .shared-ttl span { color: var(--shared); }

    /* ── EMPTY ────────────────────────────────────────────── */
    .empty { text-align: center; color: var(--ter); font-size: 14px; padding: 20px 0; }
    .empty-icon { font-size: 26px; margin-bottom: 6px; }

    /* ── SAVE TOAST ───────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #1c1c1e; color: white;
      padding: 8px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 500; z-index: 300;
      opacity: 0; transition: opacity 0.25s; pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* ── TASK PROGRESS ────────────────────────────────────── */
    .progress-card {
      margin-bottom: 16px;
      overflow: hidden;
      position: relative;
    }
    .progress-top {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .progress-label { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    .progress-status { font-size: 13px; color: var(--sub); margin-top: 3px; }
    .progress-pct {
      font-size: 36px; font-weight: 700; letter-spacing: -1px;
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .big-bar {
      height: 12px; background: var(--bg); border-radius: 6px;
      overflow: hidden; margin-bottom: 14px;
    }
    .big-fill {
      height: 100%; border-radius: 6px;
      transition: width 0.6s cubic-bezier(.34,1.2,.64,1);
      background: linear-gradient(90deg, var(--fill-a), var(--fill-b));
      position: relative; overflow: hidden;
    }
    .big-fill::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
      animation: shimmer 1.8s infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .breakdown {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .bd-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--sub);
    }
    .bd-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .bd-bar { width: 60px; height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
    .bd-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .confetti-burst {
      pointer-events: none;
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      overflow: hidden; border-radius: var(--r);
    }
    .c-piece {
      position: absolute; width: 8px; height: 8px; border-radius: 2px;
      animation: cfetti 1s ease-out forwards;
    }
    @keyframes cfetti {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-120px) rotate(720deg); opacity: 0; }
    }

    /* ── WEEK AHEAD ────────────────────────────────────────── */
    .week-card { margin-bottom: 16px; }
    .week-row {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .week-row:last-child { border-bottom: none; }
    .week-day-col { min-width: 68px; }
    .week-day-name {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.3px; color: var(--sub);
    }
    .week-day-name.today { color: inherit; }
    .week-day-date { font-size: 11px; color: var(--ter); margin-top: 1px; }
    .week-events { flex: 1; }
    .week-ev {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; padding: 2px 0;
    }
    .week-ev + .week-ev { margin-top: 4px; }
    .week-ev-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .week-ev-time { font-size: 11px; color: var(--sub); white-space: nowrap; }
    .week-free { font-size: 13px; color: var(--ter); font-style: italic; }
    .week-today-pill {
      font-size: 10px; font-weight: 600; padding: 1px 6px;
      background: var(--accent-bg); color: var(--accent-col);
      border-radius: 8px; margin-left: 4px;
    }

    /* ── UTIL ─────────────────────────────────────────────── */
    .flex-b { display: flex; justify-content: space-between; align-items: center; }
    .mt8  { margin-top: 8px; }
    .mt12 { margin-top: 12px; }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p class="loading-txt">Loading Home Base...</p>
</div>

<!-- Meal edit modal -->
<div id="meal-modal" class="overlay gone">
  <div class="modal">
    <h2 id="meal-modal-ttl">Edit Meal</h2>
    <p>What's on the menu?</p>
    <textarea id="meal-inp" class="ifield" rows="3" style="width:100%;resize:none;"></textarea>
    <div class="modal-row">
      <button id="meal-cancel" class="btn btn-ghost">Cancel</button>
      <button id="meal-save" class="btn btn-green">Save</button>
    </div>
  </div>
</div>

<header>

    <button class="tab-btn on" data-t="becca">Becca</button>

<main>
  <div id="pane-becca"  class="pane on"></div>
  <div id="pane-geoff"  class="pane"></div>
  <div id="pane-shared" class="pane"></div>
</main>

<script>
// ═══════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════
const DB      = 'https://homebase-c7dfa-default-rtdb.firebaseio.com';
const DAYS    = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
const DSHORT  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MEALS   = ['breakfast','lunch','dinner'];
const MEAL_LBL = { breakfast: 'Breakfast', lunch: 'Lunch', dinner: 'Dinner' };

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const S = {
  tab:       'becca',
  data:      { becca: null, geoff: null, shared: null },
  mealEdit:  null,
  calState:  { year: new Date().getFullYear(), month: new Date().getMonth() },
  calSel:    null
};

// ═══════════════════════════════════════════════
//  DEFAULT DATA
// ═══════════════════════════════════════════════
const defPerson = name => ({
  name,
  tasks:  { urgent: [], medium: [], low: [] },
  goals:  [],
  events: []
});

const defShared = () => ({
  events:    [],
  groceries: [],
  mealPlan: Object.fromEntries(DAYS.map(d => [d, { breakfast:'', lunch:'', dinner:'' }])),
  chores:  [],
  todos:   []
});

// ═══════════════════════════════════════════════
//  FIREBASE API
// ═══════════════════════════════════════════════
async function fbGet(path) {
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 7000);
    const r = await fetch(`${DB}/${path}.json`, { signal: ctrl.signal });
    clearTimeout(t);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function fbSet(path, data) {
  showToast();
  try {
    await fetch(`${DB}/${path}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  } catch(e) { console.error('Save failed:', e); }
  hideToast();
}

// ═══════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function showToast() {
  clearTimeout(toastTimer);
  document.getElementById('toast').classList.add('show');
}
function hideToast() {
  toastTimer = setTimeout(() => document.getElementById('toast').classList.remove('show'), 600);
}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
const uid   = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const esc   = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const today = () => new Date().toISOString().slice(0,10);

function greeting(name, accent) {
  const h = new Date().getHours();
  const msg = h >= 5 && h < 12  ? `Good morning, <b style="color:${accent}">${esc(name)}</b> ☀️`
            : h >= 12 && h < 17 ? `Good afternoon, <b style="color:${accent}">${esc(name)}</b>`
            : h >= 17 && h < 21 ? `Good evening, <b style="color:${accent}">${esc(name)}</b> 🌙`
            : `Hey, <b style="color:${accent}">${esc(name)}</b>. Still up? 🦉`;
  return msg;
}

function fmtDate() {
  return new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}

function weekDates() {
  const t = new Date(), dow = t.getDay();
  return Array.from({length:7}, (_,i) => { const d = new Date(t); d.setDate(t.getDate()-dow+i); return d; });
}

function fmtTime(t24) {
  if (!t24) return '';
  const [h,m] = t24.split(':').map(Number);
  const ampm = h >= 12 ? 'PM' : 'AM';
  return `${h%12||12}:${String(m).padStart(2,'0')} ${ampm}`;
}

// ═══════════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════════
function startClock() {
  const el = document.getElementById('clock');
  const tick = () => el.textContent = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'});
  tick(); setInterval(tick, 1000);
}

// ═══════════════════════════════════════════════
//  PROGRESS CARD
// ═══════════════════════════════════════════════
function progressCard(p) {
  const tasks   = S.data[p].tasks;
  const all     = [...tasks.urgent, ...tasks.medium, ...tasks.low];
  const done    = all.filter(t=>t.done).length;
  const total   = all.length;
  const pct     = total ? Math.round(done/total*100) : 0;
  const accent  = p==='becca' ? 'var(--becca)' : 'var(--geoff)';

  const status  = pct===0   ? 'Ready to go 💪'
                : pct<34    ? 'Getting started 🌱'
                : pct<67    ? 'On a roll 🔥'
                : pct<100   ? 'Almost there ⚡'
                : 'All done! 🎉';

  // gradient shifts red→orange→yellow→green
  const fillA   = pct===100 ? '#34c759'
                : pct>=67   ? '#ff9500'
                : pct>=34   ? '#ff6b00'
                : '#ff3b30';
  const fillB   = pct===100 ? '#30d158'
                : pct>=67   ? '#34c759'
                : pct>=34   ? '#ff9500'
                : '#ff6b00';

  const miniBar = (arr, col) => {
    const t=arr.length, d=arr.filter(x=>x.done).length;
    const w = t ? Math.round(d/t*100) : 0;
    return `<div class="bd-item">
      <div class="bd-dot" style="background:${col}"></div>
      <div class="bd-bar"><div class="bd-fill" style="width:${w}%;background:${col}"></div></div>
      <span>${d}/${t}</span>
    </div>`;
  };

  const confetti = pct===100 ? `<div class="confetti-burst" id="cb-${p}"></div>` : '';

  return `
    <div class="card progress-card" id="prog-${p}">
      ${confetti}
      <div class="progress-top">
        <div>
          <div class="progress-label">Task Progress</div>
          <div class="progress-status">${status}</div>
        </div>
        <div class="progress-pct" style="color:${fillB}">${pct}%</div>
      </div>
      <div class="big-bar">
        <div class="big-fill" style="width:${pct}%;--fill-a:${fillA};--fill-b:${fillB}"></div>
      </div>
      <div class="breakdown">
        ${miniBar(tasks.urgent,'var(--urgent)')}
        ${miniBar(tasks.medium,'var(--medium)')}
        ${miniBar(tasks.low,   'var(--low)')}
        ${total===0 ? `<span style="font-size:12px;color:var(--ter)">Add tasks below to track progress</span>` : ''}
      </div>
    </div>`;
}

function maybeConfetti(p) {
  const cb = document.getElementById(`cb-${p}`);
  if (!cb) return;
  const colors = ['#ff2d55','#ff9500','#34c759','#0071e3','#af52de','#ffcc00'];
  for (let i=0; i<24; i++) {
    const el = document.createElement('div');
    el.className = 'c-piece';
    el.style.cssText = `
      left:${Math.random()*100}%;
      top:${60+Math.random()*40}%;
      background:${colors[i%colors.length]};
      animation-delay:${Math.random()*0.4}s;
      animation-duration:${0.8+Math.random()*0.6}s;
      transform:rotate(${Math.random()*360}deg);
      border-radius:${Math.random()>0.5?'50%':'2px'};
      width:${6+Math.random()*6}px;
      height:${6+Math.random()*6}px;
    `;
    cb.appendChild(el);
  }
}

// ═══════════════════════════════════════════════
//  WEEK AHEAD CARD
// ═══════════════════════════════════════════════
function weekAheadCard(p) {
  const accent  = p==='becca' ? 'var(--becca)' : 'var(--geoff)';
  const allEvts = S.data.shared.events || [];
  const todayD  = new Date();
  todayD.setHours(0,0,0,0);

  const rows = Array.from({length:7}, (_,i) => {
    const d = new Date(todayD);
    d.setDate(todayD.getDate()+i);
    const ds      = d.toISOString().slice(0,10);
    const isToday = i===0;
    const dayEvts = allEvts
      .filter(e=>e.date===ds && (e.who===p||e.who==='both'))
      .sort((a,b)=>a.time.localeCompare(b.time));
    const dayName = d.toLocaleDateString('en-US',{weekday:'short'});
    const dayDate = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});

    const evtHTML = dayEvts.length===0
      ? `<div class="week-free">Free day</div>`
      : dayEvts.map(e => `
        <div class="week-ev">
          <div class="week-ev-dot" style="background:${accent}"></div>
          <span>${esc(e.title)}</span>
          <span class="week-ev-time">${esc(fmtTime(e.time))}</span>
        </div>`).join('');

    return `
      <div class="week-row">
        <div class="week-day-col">
          <div class="week-day-name${isToday?' today':''}">${dayName}${isToday?` <span class="week-today-pill" style="background:${accent}22;color:${accent}">today</span>`:''}</div>
          <div class="week-day-date">${dayDate}</div>
        </div>
        <div class="week-events">${evtHTML}</div>
      </div>`;
  }).join('');

  return `
    <div class="card week-card">
      <div class="card-hdr">
        <span class="card-ttl">📆 Week Ahead</span>
        <button class="btn btn-ghost btn-sm" data-act="show-event-modal" data-p="${p}">+ Add Event</button>
      </div>
      ${rows}
    </div>`;
}


function renderPerson(p) {
  const d      = S.data[p];
  const accent = p === 'becca' ? 'var(--becca)' : 'var(--geoff)';
  const btnCls = p === 'becca' ? 'btn-pink' : 'btn-blue';

  // schedule — pull from shared events filtered by person
  const evts = (S.data.shared.events||[])
    .filter(e => (e.who===p||e.who==='both') && e.date===today())
    .sort((a,b)=>a.time.localeCompare(b.time));
  const schedHTML = evts.length === 0
    ? `<div class="empty"><div class="empty-icon">✨</div>Clear day ahead</div>`
    : evts.map(e => `
      <div class="ev-item">
        <div class="ev-time">${esc(fmtTime(e.time))}</div>
        <div class="ev-dot" style="background:${accent}"></div>
        <div>
          <div class="ev-ttl">${esc(e.title)}</div>
          ${e.location ? `<div class="ev-loc">📍 ${esc(e.location)}</div>` : ''}
        </div>
      </div>`).join('');

  // goals
  const total = d.goals.length, done = d.goals.filter(g=>g.done).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  const goalsHTML = d.goals.length === 0
    ? `<div class="empty"><div class="empty-icon">🎯</div>No goals yet</div>`
    : d.goals.map(g => `
      <div class="goal-row">
        <button class="circle ${g.done?'on':''}" data-act="goal-toggle" data-p="${p}" data-id="${g.id}" style="${g.done?`background:${accent};border-color:${accent}`:''}"></button>
        <span class="goal-txt ${g.done?'done':''}">${esc(g.text)}</span>
        <button class="x-btn" data-act="goal-del" data-p="${p}" data-id="${g.id}">✕</button>
      </div>`).join('');

  // tasks
  const tCol = (pri, lbl) => {
    const list = d.tasks[pri]||[];
    return `
      <div class="card">
        <div class="col-lbl">
          <div class="dot8 ${pri}-dot"></div>
          <span class="${pri}-lbl">${lbl}</span>
          <span class="cnt">${list.length}</span>
        </div>
        <div class="irow">
          <input class="ifield task-inp" placeholder="Add task..." data-p="${p}" data-pri="${pri}" />
          <button class="btn ${btnCls} btn-sm task-add" data-p="${p}" data-pri="${pri}">+</button>
        </div>
        ${list.length===0 ? `<div class="empty" style="padding:10px 0;font-size:13px">No tasks</div>` : ''}
        ${list.map(t => `
          <div class="task-row">
            <button class="t-check ${pri}-check ${t.done?'on':''}" data-act="task-toggle" data-p="${p}" data-pri="${pri}" data-id="${t.id}"></button>
            <span class="t-txt ${t.done?'done':''}">${esc(t.text)}</span>
            <button class="x-btn" data-act="task-del" data-p="${p}" data-pri="${pri}" data-id="${t.id}">✕</button>
          </div>`).join('')}
      </div>`;
  };

  const html = `
    <div class="p-head">
      <div class="greeting">${greeting(d.name, accent)}</div>
      <div class="dateline">${fmtDate()}</div>
    </div>
    ${progressCard(p)}
    <div class="g2">
      <div class="card">
        <div class="card-hdr">
          <span class="card-ttl">📅 Today's Schedule</span>
          <button class="btn btn-ghost btn-sm" data-act="show-event-modal" data-p="${p}">+ Add</button>
        </div>
        ${schedHTML}
      </div>
      <div class="card">
        <div class="card-hdr">
          <span class="card-ttl">🎯 Daily Goals</span>
          <span class="badge">${done}/${total}</span>
        </div>
        <div class="irow">
          <input class="ifield goal-inp" placeholder="Add a goal..." data-p="${p}" />
          <button class="btn ${btnCls} btn-sm goal-add" data-p="${p}">+</button>
        </div>
        ${goalsHTML}
        ${total > 0 ? `
          <div class="prog-wrap">
            <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${accent}"></div></div>
            <div class="prog-lbl">
              <span>${pct}% complete</span>
              <button class="btn btn-ghost btn-sm" data-act="clear-goals" data-p="${p}">Clear done</button>
            </div>
          </div>` : ''}
      </div>
    </div>
    ${weekAheadCard(p)}
    <div class="g3">
      ${tCol('urgent','Urgent')}
      ${tCol('medium','Medium')}
      ${tCol('low','Low')}
    </div>`;

  document.getElementById(`pane-${p}`).innerHTML = html;
  bindPerson(p);
  // fire confetti if all tasks done
  requestAnimationFrame(() => maybeConfetti(p));
}

function bindPerson(p) {
  const pane = document.getElementById(`pane-${p}`);

  // goals: add
  pane.querySelector('.goal-inp').addEventListener('keydown', e => {
    if (e.key==='Enter') addGoal(p, e.target.value);
  });
  pane.querySelector('.goal-add').addEventListener('click', () => {
    addGoal(p, pane.querySelector('.goal-inp').value);
  });

  // tasks: add
  pane.querySelectorAll('.task-inp').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key==='Enter') addTask(p, inp.dataset.pri, inp.value); });
  });
  pane.querySelectorAll('.task-add').forEach(btn => {
    btn.addEventListener('click', () => {
      addTask(p, btn.dataset.pri, pane.querySelector(`.task-inp[data-pri="${btn.dataset.pri}"]`).value);
    });
  });

  // delegated actions
  pane.addEventListener('click', e => {
    const el  = e.target.closest('[data-act]');
    if (!el) return;
    const act = el.dataset.act;
    const id  = el.dataset.id;
    const pr  = el.dataset.pri;
    const pp  = el.dataset.p;
    if (act==='goal-toggle')      toggleGoal(pp, id);
    if (act==='goal-del')         deleteGoal(pp, id);
    if (act==='task-toggle')      toggleTask(pp, pr, id);
    if (act==='task-del')         deleteTask(pp, pr, id);
    if (act==='clear-goals')      clearGoals(pp);
    if (act==='show-event-modal') showEventModal(pp);
  });
}

// ═══════════════════════════════════════════════
//  GOAL ACTIONS
// ═══════════════════════════════════════════════
function addGoal(p, txt) {
  txt = txt.trim(); if (!txt) return;
  S.data[p].goals.push({id:uid(), text:txt, done:false});
  fbSet(p, S.data[p]);
  renderPerson(p);
}
function toggleGoal(p, id) {
  const g = S.data[p].goals.find(g=>g.id===id);
  if (g) g.done = !g.done;
  fbSet(p, S.data[p]);
  renderPerson(p);
}
function deleteGoal(p, id) {
  S.data[p].goals = S.data[p].goals.filter(g=>g.id!==id);
  fbSet(p, S.data[p]);
  renderPerson(p);
}
function clearGoals(p) {
  S.data[p].goals = S.data[p].goals.filter(g=>!g.done);
  fbSet(p, S.data[p]);
  renderPerson(p);
}

// ═══════════════════════════════════════════════
//  TASK ACTIONS
// ═══════════════════════════════════════════════
function addTask(p, pri, txt) {
  txt = txt.trim(); if (!txt) return;
  S.data[p].tasks[pri].push({id:uid(), text:txt, done:false});
  fbSet(p, S.data[p]);
  renderPerson(p);
}
function toggleTask(p, pri, id) {
  const t = S.data[p].tasks[pri].find(t=>t.id===id);
  if (t) t.done = !t.done;
  fbSet(p, S.data[p]);
  renderPerson(p);
}
function deleteTask(p, pri, id) {
  S.data[p].tasks[pri] = S.data[p].tasks[pri].filter(t=>t.id!==id);
  fbSet(p, S.data[p]);
  renderPerson(p);
}

// ═══════════════════════════════════════════════
//  EVENT MODAL (saves to shared.events)
// ═══════════════════════════════════════════════
function showEventModal(defaultWho='both', defaultDate=null) {
  const old = document.getElementById('ev-modal');
  if (old) old.remove();
  const whoOpts = ['becca','geoff','both'].map(w =>
    `<option value="${w}" ${w===defaultWho?'selected':''}>${w==='becca'?'Becca':w==='geoff'?'Geoff':'Both'}</option>`
  ).join('');
  const m = document.createElement('div');
  m.id = 'ev-modal'; m.className = 'overlay';
  m.innerHTML = `
    <div class="modal">
      <h2>Add Event</h2>
      <p>Saves to the shared calendar and shows up on the right tabs.</p>
      <input type="text" id="ev-title" class="ifield" style="width:100%;margin-bottom:8px" placeholder="Event title" />
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input type="date" id="ev-date" class="ifield" style="flex:1" value="${defaultDate||today()}" />
        <input type="time" id="ev-time" class="ifield" style="flex:1" value="09:00" />
      </div>
      <input type="text" id="ev-loc" class="ifield" style="width:100%;margin-bottom:8px" placeholder="Location (optional)" />
      <select id="ev-who" class="isel" style="width:100%">${whoOpts}</select>
      <div class="modal-row">
        <button id="ev-cancel" class="btn btn-ghost">Cancel</button>
        <button id="ev-save"   class="btn btn-green">Add to Calendar</button>
      </div>
    </div>`;
  document.body.appendChild(m);
  document.getElementById('ev-cancel').addEventListener('click', () => m.remove());
  m.addEventListener('click', e => { if (e.target===m) m.remove(); });
  document.getElementById('ev-save').addEventListener('click', () => {
    const title = document.getElementById('ev-title').value.trim();
    const date  = document.getElementById('ev-date').value;
    const time  = document.getElementById('ev-time').value;
    const loc   = document.getElementById('ev-loc').value.trim();
    const who   = document.getElementById('ev-who').value;
    if (!title||!date||!time) return;
    if (!S.data.shared.events) S.data.shared.events = [];
    S.data.shared.events.push({id:uid(), title, date, time, location:loc, who});
    fbSet('shared', S.data.shared);
    m.remove();
    renderPerson('becca');
    renderPerson('geoff');
    renderShared();
  });
  document.getElementById('ev-title').focus();
}

// ═══════════════════════════════════════════════
//  SHARED CALENDAR
// ═══════════════════════════════════════════════
function renderCalendar() {
  const events = S.data.shared.events || [];
  const { year, month } = S.calState;
  const todayStr   = today();
  const firstDay   = new Date(year, month, 1);
  const daysInMo   = new Date(year, month+1, 0).getDate();
  const startDow   = firstDay.getDay();
  const prevLast   = new Date(year, month, 0).getDate();
  const monthLabel = firstDay.toLocaleDateString('en-US',{month:'long', year:'numeric'});

  // build 42 cells (6 rows × 7 cols)
  const cells = [];
  for (let i=0; i<startDow; i++) {
    const day = prevLast - startDow + i + 1;
    cells.push({ day, dateStr: new Date(year,month-1,day).toISOString().slice(0,10), other:true });
  }
  for (let d=1; d<=daysInMo; d++) {
    cells.push({ day:d, dateStr: new Date(year,month,d).toISOString().slice(0,10), other:false });
  }
  while (cells.length < 42) {
    const d = cells.length - startDow - daysInMo + 1;
    cells.push({ day:d, dateStr: new Date(year,month+1,d).toISOString().slice(0,10), other:true });
  }

  const cellsHTML = cells.map(c => {
    const dayEvts   = events.filter(e=>e.date===c.dateStr);
    const isToday   = c.dateStr===todayStr;
    const isSel     = c.dateStr===S.calSel;
    const chipsHTML = dayEvts.slice(0,2).map(e => {
      const col = e.who==='becca'?'var(--becca)':e.who==='geoff'?'var(--geoff)':'var(--shared)';
      const bg  = e.who==='becca'?'var(--becca-bg)':e.who==='geoff'?'var(--geoff-bg)':'var(--shared-bg)';
      return `<span class="cal-chip" style="color:${col};background:${bg}">${esc(e.title)}</span>`;
    }).join('') + (dayEvts.length>2 ? `<span style="font-size:10px;color:var(--sub)">+${dayEvts.length-2} more</span>` : '');

    return `<div class="cal-cell ${c.other?'other-month':''} ${isToday?'is-today':''} ${isSel?'is-sel':''}"
      data-act="cal-day" data-date="${c.dateStr}">
      <div class="cal-day-num">${c.day}</div>
      ${chipsHTML}
    </div>`;
  }).join('');

  // selected day panel
  let selPanel = '';
  if (S.calSel) {
    const selEvts = events.filter(e=>e.date===S.calSel).sort((a,b)=>a.time.localeCompare(b.time));
    const selLabel = new Date(S.calSel+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    const evtRows  = selEvts.length === 0
      ? `<div class="week-free" style="padding:8px 0">No events — <button class="link-btn" data-act="add-ev-sel">add one</button></div>`
      : selEvts.map(e => {
          const col    = e.who==='becca'?'var(--becca)':e.who==='geoff'?'var(--geoff)':'var(--shared)';
          const pilCls = e.who==='becca'?'pill-becca':e.who==='geoff'?'pill-geoff':'pill-both';
          const pilTxt = e.who==='becca'?'Becca':e.who==='geoff'?'Geoff':'Both';
          return `<div class="cal-ev-row">
            <div class="cal-ev-time">${fmtTime(e.time)||'All day'}</div>
            <div class="cal-ev-dot" style="background:${col}"></div>
            <div class="cal-ev-info">
              <div class="cal-ev-ttl">${esc(e.title)}</div>
              ${e.location?`<div class="cal-ev-loc">📍 ${esc(e.location)}</div>`:''}
            </div>
            <span class="assignee-pill ${pilCls}">${pilTxt}</span>
            <button class="x-btn" data-act="del-ev" data-id="${e.id}" style="opacity:0.7">✕</button>
          </div>`;
        }).join('');

    selPanel = `<div class="cal-sel-panel">
      <div class="cal-sel-date">${selLabel}</div>
      ${evtRows}
    </div>`;
  }

  return `<div class="card" style="margin-bottom:16px">
    <div class="card-hdr">
      <span class="card-ttl">📅 Shared Calendar</span>
      <button class="btn btn-green btn-sm" data-act="add-ev-modal">+ Add Event</button>
    </div>
    <div class="cal-nav">
      <button class="btn btn-ghost btn-sm" data-act="cal-prev">← Prev</button>
      <div class="cal-month-lbl">${monthLabel}</div>
      <button class="btn btn-ghost btn-sm" data-act="cal-next">Next →</button>
    </div>
    <div class="cal-grid">
      ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cellsHTML}
    </div>
    ${selPanel}
  </div>`;
}

function deleteEvent(id) {
  S.data.shared.events = (S.data.shared.events||[]).filter(e=>e.id!==id);
  fbSet('shared', S.data.shared);
  renderPerson('becca');
  renderPerson('geoff');
  renderShared();
}

// ═══════════════════════════════════════════════
//  RENDER — SHARED TAB
// ═══════════════════════════════════════════════
function renderShared() {
  const d = S.data.shared;

  const grocHTML = d.groceries.length === 0
    ? `<div class="empty"><div class="empty-icon">🛒</div>List is empty</div>`
    : d.groceries.map(g => `
      <div class="grocery-row">
        <button class="g-check ${g.done?'on':''}" data-act="g-toggle" data-id="${g.id}"></button>
        <span class="g-txt ${g.done?'done':''}">${esc(g.text)}</span>
        ${g.cat ? `<span class="g-cat">${esc(g.cat)}</span>` : ''}
        <button class="x-btn" data-act="g-del" data-id="${g.id}">✕</button>
      </div>`).join('');

  const choreHTML = d.chores.length === 0
    ? `<div class="empty"><div class="empty-icon">🧹</div>No chores yet</div>`
    : d.chores.map(c => `
      <div class="chore-row">
        <button class="c-check ${c.done?'on':''}" data-act="c-toggle" data-id="${c.id}"></button>
        <span class="c-txt ${c.done?'done':''}">${esc(c.text)}</span>
        <span class="assignee-pill pill-${c.who}">${c.who==='both'?'Both':c.who==='becca'?'Becca':'Geoff'}</span>
        <button class="x-btn" data-act="c-del" data-id="${c.id}">✕</button>
      </div>`).join('');

  const todoHTML = d.todos.length === 0
    ? `<div class="empty"><div class="empty-icon">📋</div>Nothing here</div>`
    : d.todos.map(t => `
      <div class="todo-row">
        <button class="td-check ${t.done?'on':''}" data-act="td-toggle" data-id="${t.id}"></button>
        <span class="td-txt ${t.done?'done':''}">${esc(t.text)}</span>
        ${t.who ? `<span class="td-who">${esc(t.who)}</span>` : ''}
        <button class="x-btn" data-act="td-del" data-id="${t.id}">✕</button>
      </div>`).join('');

  const wd  = weekDates();
  const dow = new Date().getDay();
  const mealHTML = DAYS.map((day,i) => {
    const mp = d.mealPlan[day]||{};
    const dm = wd[i].toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return `
      <div class="meal-day">
        <div class="meal-dh ${i===dow?'today':''}">
          ${DSHORT[i]}<small>${dm}</small>
        </div>
        ${MEALS.map(m => `
          <div class="meal-slot ${mp[m]?'':'empty'}" data-act="meal-edit" data-day="${day}" data-meal="${m}">
            <div class="meal-label">${m.slice(0,1).toUpperCase()}</div>
            <div class="meal-txt">${mp[m] ? esc(mp[m]) : 'tap to add'}</div>
          </div>`).join('')}
      </div>`;
  }).join('');

  const html = `
    <div class="shared-hdr">
      <div class="shared-ttl">Our <span>Home Base</span> 🏡</div>
      <div class="dateline">${fmtDate()}</div>
    </div>
    ${renderCalendar()}
    <div class="g2">
      <div class="card">
        <div class="card-hdr">
          <span class="card-ttl">🛒 Grocery List</span>
          <button class="btn btn-ghost btn-sm" data-act="g-clear">Clear done</button>
        </div>
        <div class="irow">
          <input class="ifield" id="g-inp" placeholder="Add item..." />
          <select class="isel" id="g-cat">
            <option value="">Category</option>
            <option>Produce</option><option>Protein</option>
            <option>Dairy</option><option>Pantry</option>
            <option>Frozen</option><option>Snacks</option>
            <option>Drinks</option><option>Other</option>
          </select>
          <button class="btn btn-green btn-sm" data-act="g-add">+</button>
        </div>
        <div id="groc-list">${grocHTML}</div>
      </div>
      <div class="card">
        <div class="card-hdr">
          <span class="card-ttl">📋 Shared To-Dos</span>
          <button class="btn btn-ghost btn-sm" data-act="td-clear">Clear done</button>
        </div>
        <div class="irow">
          <input class="ifield" id="td-inp" placeholder="Add to-do..." />
          <select class="isel" id="td-who">
            <option value="">Who?</option>
            <option value="Becca">Becca</option>
            <option value="Geoff">Geoff</option>
            <option value="Both">Both</option>
          </select>
          <button class="btn btn-green btn-sm" data-act="td-add">+</button>
        </div>
        <div id="todo-list">${todoHTML}</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="card-hdr">
        <span class="card-ttl">🧹 Chore Chart</span>
        <button class="btn btn-ghost btn-sm" data-act="c-reset">Reset week</button>
      </div>
      <div class="irow">
        <input class="ifield" id="c-inp" placeholder="Add chore..." />
        <select class="isel" id="c-who">
          <option value="both">Both</option>
          <option value="becca">Becca</option>
          <option value="geoff">Geoff</option>
        </select>
        <button class="btn btn-green btn-sm" data-act="c-add">+</button>
      </div>
      <div id="chore-list">${choreHTML}</div>
    </div>
    <div class="card">
      <div class="card-hdr">
        <span class="card-ttl">🍽️ Meal Plan</span>
        <span class="badge">This Week</span>
      </div>
      <div class="meal-grid">${mealHTML}</div>
    </div>`;

  document.getElementById('pane-shared').innerHTML = html;
  bindShared();
}

function bindShared() {
  const pane = document.getElementById('pane-shared');

  document.getElementById('g-inp').addEventListener('keydown', e => { if(e.key==='Enter') addGrocery(); });
  document.getElementById('td-inp').addEventListener('keydown', e => { if(e.key==='Enter') addTodo(); });
  document.getElementById('c-inp').addEventListener('keydown', e => { if(e.key==='Enter') addChore(); });

  pane.addEventListener('click', e => {
    const el  = e.target.closest('[data-act]');
    if (!el) return;
    const act = el.dataset.act;
    const id  = el.dataset.id;
    // calendar
    if (act==='cal-prev') {
      S.calState.month--;
      if (S.calState.month < 0) { S.calState.month=11; S.calState.year--; }
      S.calSel = null; renderShared(); return;
    }
    if (act==='cal-next') {
      S.calState.month++;
      if (S.calState.month > 11) { S.calState.month=0; S.calState.year++; }
      S.calSel = null; renderShared(); return;
    }
    if (act==='cal-day') {
      S.calSel = S.calSel===el.dataset.date ? null : el.dataset.date;
      renderShared(); return;
    }
    if (act==='add-ev-modal') { showEventModal('both'); return; }
    if (act==='add-ev-sel')   { showEventModal('both', S.calSel); return; }
    if (act==='del-ev')       { deleteEvent(id); return; }
    // grocery
    if (act==='g-add')     addGrocery();
    if (act==='g-toggle')  toggleGrocery(id);
    if (act==='g-del')     deleteGrocery(id);
    if (act==='g-clear')   clearGroceries();
    // todos
    if (act==='td-add')    addTodo();
    if (act==='td-toggle') toggleTodo(id);
    if (act==='td-del')    deleteTodo(id);
    if (act==='td-clear')  clearTodos();
    // chores
    if (act==='c-add')     addChore();
    if (act==='c-toggle')  toggleChore(id);
    if (act==='c-del')     deleteChore(id);
    if (act==='c-reset')   resetChores();
    // meals
    if (act==='meal-edit') openMealModal(el.dataset.day, el.dataset.meal);
  });
}

// ═══════════════════════════════════════════════
//  GROCERY
// ═══════════════════════════════════════════════
function addGrocery() {
  const txt = document.getElementById('g-inp').value.trim();
  const cat = document.getElementById('g-cat').value;
  if (!txt) return;
  S.data.shared.groceries.push({id:uid(), text:txt, cat, done:false});
  fbSet('shared', S.data.shared); renderShared();
}
function toggleGrocery(id) {
  const g = S.data.shared.groceries.find(g=>g.id===id);
  if (g) g.done = !g.done;
  fbSet('shared', S.data.shared); renderShared();
}
function deleteGrocery(id) {
  S.data.shared.groceries = S.data.shared.groceries.filter(g=>g.id!==id);
  fbSet('shared', S.data.shared); renderShared();
}
function clearGroceries() {
  S.data.shared.groceries = S.data.shared.groceries.filter(g=>!g.done);
  fbSet('shared', S.data.shared); renderShared();
}

// ═══════════════════════════════════════════════
//  TODOS
// ═══════════════════════════════════════════════
function addTodo() {
  const txt = document.getElementById('td-inp').value.trim();
  const who = document.getElementById('td-who').value;
  if (!txt) return;
  S.data.shared.todos.push({id:uid(), text:txt, who, done:false});
  fbSet('shared', S.data.shared); renderShared();
}
function toggleTodo(id) {
  const t = S.data.shared.todos.find(t=>t.id===id);
  if (t) t.done = !t.done;
  fbSet('shared', S.data.shared); renderShared();
}
function deleteTodo(id) {
  S.data.shared.todos = S.data.shared.todos.filter(t=>t.id!==id);
  fbSet('shared', S.data.shared); renderShared();
}
function clearTodos() {
  S.data.shared.todos = S.data.shared.todos.filter(t=>!t.done);
  fbSet('shared', S.data.shared); renderShared();
}

// ═══════════════════════════════════════════════
//  CHORES
// ═══════════════════════════════════════════════
function addChore() {
  const txt = document.getElementById('c-inp').value.trim();
  const who = document.getElementById('c-who').value;
  if (!txt) return;
  S.data.shared.chores.push({id:uid(), text:txt, who, done:false});
  fbSet('shared', S.data.shared); renderShared();
}
function toggleChore(id) {
  const c = S.data.shared.chores.find(c=>c.id===id);
  if (c) c.done = !c.done;
  fbSet('shared', S.data.shared); renderShared();
}
function deleteChore(id) {
  S.data.shared.chores = S.data.shared.chores.filter(c=>c.id!==id);
  fbSet('shared', S.data.shared); renderShared();
}
function resetChores() {
  S.data.shared.chores.forEach(c => c.done = false);
  fbSet('shared', S.data.shared); renderShared();
}

// ═══════════════════════════════════════════════
//  MEAL PLAN
// ═══════════════════════════════════════════════
function openMealModal(day, meal) {
  S.mealEdit = {day, meal};
  const cur = (S.data.shared.mealPlan[day]||{})[meal]||'';
  const dayLabel = DSHORT[DAYS.indexOf(day)];
  document.getElementById('meal-modal-ttl').textContent = `${dayLabel} — ${MEAL_LBL[meal]}`;
  document.getElementById('meal-inp').value = cur;
  document.getElementById('meal-modal').classList.remove('gone');
  setTimeout(()=>document.getElementById('meal-inp').focus(),100);
}
function closeMealModal() {
  document.getElementById('meal-modal').classList.add('gone');
  S.mealEdit = null;
}
function saveMeal() {
  if (!S.mealEdit) return;
  const {day,meal} = S.mealEdit;
  const val = document.getElementById('meal-inp').value.trim();
  if (!S.data.shared.mealPlan[day]) S.data.shared.mealPlan[day]={};
  S.data.shared.mealPlan[day][meal] = val;
  fbSet('shared', S.data.shared);
  closeMealModal(); renderShared();
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
async function loadAll() {
  const [becca, geoff, shared] = await Promise.all([
    fbGet('becca'), fbGet('geoff'), fbGet('shared')
  ]);
  S.data.becca  = becca  || defPerson('Becca');
  S.data.geoff  = geoff  || defPerson('Geoff');
  S.data.shared = shared || defShared();
  if (!S.data.becca.name)  S.data.becca.name  = 'Becca';
  if (!S.data.geoff.name)  S.data.geoff.name  = 'Geoff';
  if (!S.data.shared.events)   S.data.shared.events   = [];
  if (!S.data.shared.chores)   S.data.shared.chores   = [];
  if (!S.data.shared.todos)    S.data.shared.todos    = [];
  if (!S.data.shared.groceries) S.data.shared.groceries = [];
  if (!S.data.shared.mealPlan) S.data.shared.mealPlan =
    Object.fromEntries(DAYS.map(d=>[d,{breakfast:'',lunch:'',dinner:''}]));

  try { renderPerson('becca'); } catch(e) { console.error('render becca', e); }
  try { renderPerson('geoff'); } catch(e) { console.error('render geoff', e); }
  try { renderShared();        } catch(e) { console.error('render shared', e); }
  startClock();
}

function setupGlobalListeners() {
  // tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
      document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
      btn.classList.add('on');
      document.getElementById(`pane-${btn.dataset.t}`).classList.add('on');
      S.tab = btn.dataset.t;
    });
  });
  // meal modal
  document.getElementById('meal-cancel').addEventListener('click', closeMealModal);
  document.getElementById('meal-save').addEventListener('click', saveMeal);
  document.getElementById('meal-modal').addEventListener('click', e => {
    if (e.target===document.getElementById('meal-modal')) closeMealModal();
  });
  document.getElementById('meal-inp').addEventListener('keydown', e => {
    if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveMeal();}
  });
}

async function init() {
  try {
    await loadAll();
  } catch(err) {
    console.error(err);
    // render with defaults so page is usable even offline
    try { renderPerson('becca'); } catch{}
    try { renderPerson('geoff'); } catch{}
    try { renderShared();        } catch{}
    startClock();
  } finally {
    document.getElementById('loading').classList.add('gone');
    setupGlobalListeners();
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
